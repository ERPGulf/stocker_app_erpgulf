docs: |
  
  ## 7. Item Search — `item search.yml`

  **Endpoint:** `GET .../api/method/stocker.stocker.api.list_items_search`
  **Function:** [`list_items_search()`](../stocker/stocker/api.py#L827-L859)

  ### What it does
  Simple paginated item lookup, matching `item` against either `name` or `item_name`
  (`LIKE %value%`, OR'd together).

  ### Parameters
  | Name | Required | Description |
  |---|---|---|
  | `item` | No | Search term matched against item code and item name. If omitted, no name filter is applied. |
  | `limit` | No | Page size (`limit_page_length`). |
  | `offset` | No | Page start (`limit_start`), defaults to `0`. |

  ### Success response — `200`
  ```json
  {
    "data": [
      { "item_code": "ITEM-00351", "item_name": "Cooker Switch", "item_group": "Products" }
    ]
  }
  ```

  ### Error response — `500`
  ```json
  { "error": "<exception message>" }
  ```

  ---
